name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@f49d301c653f9aa0d99bec7b7f18f2d789e93fa7 # v0.43.4
    with:
      image: ghcr.io/radiorabe/pathfinderevents
      name: pathfinderevents
      display-name: Subscribe to Pathfinder changes and emit CloudEvents on change
      tags: minimal rhel9 ubi9 rabe kafka cloudevents pathfinder axia
  mkdocs:
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@f49d301c653f9aa0d99bec7b7f18f2d789e93fa7 # v0.43.4
