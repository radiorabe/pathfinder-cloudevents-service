name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@3f1ee42ffa54794a512d3989c34e3b4514de64cc # v0.43.1
    with:
      image: ghcr.io/radiorabe/pathfinderevents
      name: pathfinderevents
      display-name: Subscribe to Pathfinder changes and emit CloudEvents on change
      tags: minimal rhel9 ubi9 rabe kafka cloudevents pathfinder axia
  mkdocs:
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@3f1ee42ffa54794a512d3989c34e3b4514de64cc # v0.43.1
